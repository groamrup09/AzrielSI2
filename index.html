<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZRIEL SI2A - DartPad Challenge</title>

<style>
  body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
  overflow-x: hidden;
}

.rain {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background-image: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.3) 0px,
    rgba(255,255,255,0.3) 2px,
    transparent 2px,
    transparent 15px
  );
  animation: rainFall 0.5s linear infinite;
  z-index: 0;
}

@keyframes rainFall {
  from { background-position: 0 0; }
  to { background-position: 0 20px; }
}


.container {
  position: relative;
  z-index: 2;
}
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f4f6f9;
  text-align: center;
}

.container {
  max-width: 800px;
  margin: auto;
}

h2 {
  margin-bottom: 10px;
}

.description {
  margin-bottom: 20px;
  color: #555;
}

button {
  padding: 10px 20px;
  background: #0066ff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 20px;
}

button:hover {
  background: #0044cc;
}

img {
  width: 100%;
  max-width: 600px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}


.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 900px;
  margin: 5% auto;
  padding: 10px;
  border-radius: 10px;
}

.close {
  float: right;
  font-size: 24px;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="rain"></div>
<div class="container">

<h2>Program Fibonacci</h2>

<p class="description">
Program ini menampilkan hasil perhitungan Fibonacci menggunakan rekursi di Dart.
Gambar di bawah adalah hasil output program.
</p>

<button onclick="openModal()">Lihat Source Code</button>

<br>

<img src="capture-output.png" alt="Output Program">

</div>


<div id="dartModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <iframe 
      src="https://dartpad.dev/embed-dart.html?id=bd3af42ea20c8e23cc0e63354048a81c"
      width="100%" 
      height="500"
      frameborder="0">
    </iframe>

  </div>
</div>

<script>
function openModal() {
  document.getElementById("dartModal").style.display = "block";
}

function closeModal() {
  document.getElementById("dartModal").style.display = "none";
}
</script>

</body>
</html>
