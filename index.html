<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Fibonacci</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
  min-height: 100vh;
  overflow-x: hidden;
}


.rain {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 1;
}

.drop {
  position: absolute;
  bottom: 100%;
  width: 2px;
  height: 15px;
  background: rgba(255,255,255,0.4);
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}


.container {
  position: relative;
  z-index: 2;
  max-width: 800px;
  margin: 100px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
  margin-bottom: 15px;
}

p {
  margin-bottom: 20px;
  color: #555;
}

button {
  padding: 12px 25px;
  background: #0066ff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  margin-bottom: 25px;
  transition: 0.3s;
}

button:hover {
  background: #0044cc;
}

img {
  width: 100%;
  max-width: 600px;
  border-radius: 10px;
}


.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 900px;
  margin: 5% auto;
  padding: 15px;
  border-radius: 10px;
}

.close {
  float: right;
  font-size: 28px;
  cursor: pointer;
}
</style>
</head>

<body>


<div class="rain" id="rain"></div>

<div class="container">
  <h1>Program Fibonacci</h1>
  <p>
    Program ini menampilkan hasil perhitungan Fibonacci menggunakan rekursi di Dart.
    Gambar di bawah adalah hasil output program.
  </p>

  <button onclick="openModal()">Lihat Source Code</button>

  <img src="capture-output.png" alt="capture-output Program">
</div>


<div id="dartModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <iframe 
      src="https://dartpad.dev/embed-dart.html?id=bd3af42ea20c8e23cc0e63354048a81c""
      width="100%" 
      height="500"
      frameborder="0">
    </iframe>
  </div>
</div>

<script>

const rainContainer = document.getElementById("rain");

for (let i = 0; i < 100; i++) {
  const drop = document.createElement("div");
  drop.classList.add("drop");
  drop.style.left = Math.random() * 100 + "vw";
  drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + "s";
  drop.style.animationDelay = Math.random() * 5 + "s";
  rainContainer.appendChild(drop);
}


function openModal() {
  document.getElementById("dartModal").style.display = "block";
}

function closeModal() {
  document.getElementById("dartModal").style.display = "none";
}
</script>

</body>
</html>
