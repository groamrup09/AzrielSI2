<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Fibonacci</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2027;
  overflow:hidden;
}
.rain span{
  position:absolute;
  width:2px;height:15px;
  background:#fff;
  opacity:.4;
  animation:fall linear infinite;
}
@keyframes fall{to{transform:translateY(100vh)}}

.box{
  position:relative;
  z-index:2;
  max-width:700px;
  margin:80px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  text-align:center;
}
button{
  padding:10px 20px;
  background:#0066ff;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
img{width:100%;margin-top:15px;border-radius:8px;}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
}
.modal iframe{
  width:90%;
  height:80%;
  margin:5% auto;
  display:block;
  background:#fff;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="rain" id="rain"></div>

<div class="box">
  <h2>Program Fibonacci</h2>
  <p>Program Dart untuk menampilkan deret Fibonacci.</p>
  <button onclick="m.style.display='block'">Lihat Source Code</button>
  <img src="capture-output.png" alt="capture-output">
</div>

<div class="modal" id="m" onclick="this.style.display='none'">
  <iframe src="https://dartpad.dev/embed-dart.html?id=bd3af42ea20c8e23cc0e63354048a81c"></iframe>
</div>

<script>
for(let i=0;i<80;i++){
  let s=document.createElement("span");
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=Math.random()+.5+"s";
  rain.appendChild(s);
}
</script>

</body>
</html>
